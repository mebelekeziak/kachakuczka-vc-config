	{
		name = SolVC-Earth-HighCirrus
		body = Earth

		// High, thin and fast. This layer uses the cirrus texture channels as documented by
		// the installed Sol texture notes: B = coverage, R = type.
		altitude = 16000
		speedMode = LinearSurface
		speed = 0,62,0
		detailSpeed = 0,-2,0
		offset = 0,0,180

		settings
