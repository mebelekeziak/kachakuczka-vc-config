			}
			droplets
			{
				dropletsConfig = droplets-cloud-Kerbin
			}
			lightVolumeSettings
			{
			}
			phaseFunctions
			{
				singleScattering1 = 0.95,0.12
				singleScattering2 = 0.8,0.22
				multipleScattering1 = 0.2,2.2
				multipleScattering2 = -0.4,0.25
			}

			cloudTypes
			{
				Item
