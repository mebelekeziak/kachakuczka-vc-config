// SolVolumetricClouds
// Earth-only Blackrack/EVE raymarched volumetric cloud replacement for Sol quarter-scale.
//
// Target install discovered locally:
// - Body name: Earth
// - Sol scale: SystemScale = Quarter
// - EVE: EnvironmentalVisualEnhancements 3.1.2.0 with layerRaymarchedVolumeV5 support
//
// This patch removes the bundled Sol Earth cloud OBJECTs plus any stale SolVC-Earth copies,
// raises the shared V5 raymarch quality preset away from its very aggressive stock temporal
// upscale, then injects one clean set of three V5 volumetric Earth layers. No texture assets
// are copied; all paths reference assets already present in this KSP install.

@EVE_CLOUDS:HAS[~SolVCOwner[True]]:NEEDS[EnvironmentalVisualEnhancements,StockVolumetricClouds,SolSystem]:FINAL
{
	// Remove stale Earth layers late. Sol adds Sol_Configuration in :LAST[SolSystem], so
	// :AFTER[SolSystem] cleanup runs too early and leaves duplicate Earth layers alive.
	// This also quarantines accidental SolVC-Earth copies inside StockVolumetricClouds or
	// other Sol-Visuals planet files while preserving this package's marked EVE_CLOUDS node.
	!OBJECT:HAS[#name[Earth-TropicalCumulus]] {}
	!OBJECT:HAS[#name[Earth-TemperateCumulus]] {}
	!OBJECT:HAS[#name[Earth-Cirrus]] {}
	!OBJECT:HAS[#name[SolVC-Earth-LowWeather]] {}
	!OBJECT:HAS[#name[SolVC-Earth-MidBrokenBands]] {}
	!OBJECT:HAS[#name[SolVC-Earth-HighCirrus]] {}
}

@EVE_RAYMARCHED_CLOUDS_QUALITY:NEEDS[EnvironmentalVisualEnhancements,StockVolumetricClouds]:FINAL
{
	@OBJECT,0
	{
		// StockVolumetricClouds defaults to x32 temporal upscaling, which is cheap but can
		// reconstruct as blocky cloud/sky bands during camera motion. x16 is much cheaper
		// than x8; the sky shimmer fix below handles the cloud-edge godray noise.
		%temporalUpscaling = x16
		%lightVolumeSettings
		{
			%horizontalResolution = 320
			%directLightTimeSlicing = 8
		}
	}
}

@Scatterer_config:NEEDS[Scatterer]:FINAL
{
	// Cloud godrays are reconstructed in the sky around cloud silhouettes and can shimmer
	// hard with mouse movement, especially when duplicate Earth cloud layers are present.
	// Keep TAA enabled, but disable the noisy cloud-godray pass; terrain godrays remain on.
	%useTemporalAntiAliasing = True
	%disableTaaBelowFrameRateThreshold = 0
	%useRaymarchedCloudGodrays = False
	%raymarchedGodraysStepCount = 72
	%taaJitterSpread = 0.55
}

