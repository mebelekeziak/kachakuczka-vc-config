// SolVolumetricClouds
// Earth-only Blackrack/EVE raymarched volumetric cloud replacement for Sol quarter-scale.
//
// Target install discovered locally:
// - Body name: Earth
// - Sol scale: SystemScale = Quarter
// - EVE: EnvironmentalVisualEnhancements 3.1.2.0 with layerRaymarchedVolumeV5 support
//
// This patch removes the bundled Sol Earth cloud OBJECTs plus any stale SolVC-Earth copies,
// raises the shared V5 raymarch quality preset away from its very aggressive stock temporal
// upscale, then injects one clean set of three V5 volumetric Earth layers. No texture assets
// are copied; all paths reference assets already present in this KSP install.

@EVE_CLOUDS:HAS[@Sol_Configuration:HAS[#SystemScale[Quarter]]]:NEEDS[EnvironmentalVisualEnhancements,StockVolumetricClouds]:AFTER[SolSystem]
{
	// Remove every stale Earth cloud layer with these names from all EVE_CLOUDS nodes before
	// injecting the replacement once below. This keeps the patch idempotent even if another
	// config already contains SolVC-Earth-* objects.
	!OBJECT[Earth-TropicalCumulus] {}
	!OBJECT[Earth-TemperateCumulus] {}
	!OBJECT[Earth-Cirrus] {}
	!OBJECT[SolVC-Earth-LowWeather] {}
	!OBJECT[SolVC-Earth-MidBrokenBands] {}
	!OBJECT[SolVC-Earth-HighCirrus] {}
}

@EVE_RAYMARCHED_CLOUDS_QUALITY:NEEDS[EnvironmentalVisualEnhancements,StockVolumetricClouds]:AFTER[SolSystem]
{
	@OBJECT,0
	{
		// StockVolumetricClouds defaults to x32 temporal upscaling, which is cheap but can
		// reconstruct as blocky cloud/sky bands. x16 is the first quality step before x8.
		%temporalUpscaling = x16
		%lightVolumeSettings
		{
			%horizontalResolution = 320
			%directLightTimeSlicing = 8
		}
	}
}

// ModuleManager cannot combine :HAS filtering with an index selector, so the cleanup above
// stays quarter-scale guarded and the actual injection targets only the first EVE_CLOUDS node.
@EVE_CLOUDS,0:NEEDS[EnvironmentalVisualEnhancements,StockVolumetricClouds,SolSystem]:AFTER[SolSystem]
{
	OBJECT
	{
		name = SolVC-Earth-LowWeather
		body = Earth

		// Layer altitude and movement:
		// altitude places the 2D support shell; cloudTypes below set the actual V5 volume height.
		// speed/detailSpeed are the main time progression controls.
		altitude = 3000
		speedMode = LinearSurface
		speed = 0,24,0
		detailSpeed = 0,7,0
		offset = 18,0,0

		settings
		{
			// Orbit/detail tuning:
			// _Color alpha is deliberately restrained so the 2D shell supports orbit visibility
			// without overpowering the volumetric clouds.
			_DetailTex = StockVolumetricClouds/Clouds/Textures/PluginData/detail1
			_DetailScale = 20
			_UVNoiseTex = StockVolumetricClouds/Clouds/Textures/PluginData/uvnoise1
			_UVNoiseStrength = 0.000035
			_BumpScale = 0
			_Lambertian = 0.74
			_Color = 255,255,255,58
			_MainTex
			{
				value = Sol-Textures/PluginData/03_Earth-System/03_Earth/EVE/EarthTemperate/EarthTemperate
				type = AlphaMap
				alphaMask = ALPHAMAP_R
			}
			_BumpMap
			{
				value = Sol-Textures/PluginData/03_Earth-System/03_Earth/EVE/EarthTemperate/EarthTemperateNormal
			}
			_FlowMap
			{
			}
		}

		layer2D
		{
			macroCloudMaterial
			{
				_DetailDist = 2E-06
			}
			shadowMaterial
			{
				_ShadowFactor = 0.10
				_VolumetricShadowDensity
				{
				}
			}
		}

		layerRaymarchedVolumeV5
		{
			// Density/opacity tuning:
			// Lower color alpha or cloudTypes density values if the deck is too opaque.
			color = 178,178,178,255
			upwardsCloudSpeed = 2
			scaledFadeStartAltitude = 85000
			scaledFadeEndAltitude = 130000
			skylightMultiplier = 1.0
			skylightTintMultiplier = 0.72

			// Performance tuning:
			// Increase baseStepSize or lower lightMarchSteps/lightMarchDistance for more FPS.
			raymarchingSettings
			{
				lightMarchSteps = 4
				lightMarchDistance = 3000
				baseStepSize = 48
				adaptiveStepSizeFactor = 0.00055
				maxStepSize = 620
			}

			noise
			{
				// Higher erosionDepth breaks up the mask more; lower values make broader sheets.
				erosionDepth = 0.28
				worley
				{
					spherical = 1
					persistence = 0.57
					lacunarity = 3
					octaves = 5
					periods = 3
