					}
				}
				Item
				{
					typeName = ToweringCumulus
					minAltitude = 2600
					maxAltitude = 7600
					interpolateCloudHeights = false
					density = 0.0066
					baseNoiseTiling = 2000
					ambientVolume = 2.5
					dropletsDensity = 0.30
					noiseEdgeHardness = 0.68
					multipleScatteringBrightness = 0.88
					curlNoiseStrength = 0.38
					coverageCurve
					{
						key = 0.04 0 0.7 0.7
						key = 0.24 0.78 0.05 -0.15
						key = 0.64 0.58 -0.20 -0.20
						key = 0.92 0.18 -0.45 -0.45
						key = 1 0.02 0 0
					}
					densityCurve
					{
						key = 0 0 1 1
						key = 0.22 1 0 0
						key = 0.72 0.82 -0.25 -0.25
						key = 1 0.12 -1 -1
					}
				}
			}

			curlNoise
			{
				// Orbit detail and fluffy breakup. Reducing strength makes smoother/flatter clouds.
				periods = 3
				tiling = 48000
				strength = 380
				contrast = 0.07
				smooth = True
			}
		}
	}

